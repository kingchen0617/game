<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>羅喉傳：天都戰記 v4-fixed</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="title-screen" class="title-screen">
    <div class="title-overlay">
      <h1>羅喉傳：天都戰記</h1>
      <p>v4-fixed・可運行修正版</p>
      <div class="title-buttons">
        <button id="start-game-btn">開始遊戲</button>
        <button id="show-help-btn" class="ghost">操作說明</button>
      </div>
    </div>
  </div>

  <div id="help-modal" class="modal hidden">
    <div class="modal-card">
      <h2>操作說明</h2>
      <ul class="help-list">
        <li>點擊地圖節點探索區域</li>
        <li>戰鬥可使用普通攻擊、武君戰印、計略觀心、終式・計都斬</li>
        <li>背包可使用消耗品，也可裝備武器、防具、飾品</li>
        <li>擊敗敵人後可獲得掉寶與升級</li>
        <li>支援完整存檔與讀檔</li>
      </ul>
      <button id="close-help-btn">關閉</button>
    </div>
  </div>

  <div id="game-app" class="page-shell hidden">
    <aside class="sidebar panel">
      <h1>羅喉傳：天都戰記</h1>
      <p class="subtitle">v4-fixed・正式版</p>

      <section class="portrait-panel">
        <div class="portrait-frame"><div class="portrait-name">武君・羅喉</div></div>
      </section>

      <section class="status-block">
        <h2>角色狀態</h2>
        <div class="meter-wrap"><div class="meter-label"><span>氣血</span><span id="hp-text"></span></div><div class="meter"><div id="hp-bar" class="meter-fill"></div></div></div>
        <div class="meter-wrap"><div class="meter-label"><span>真元</span><span id="mp-text"></span></div><div class="meter"><div id="mp-bar" class="meter-fill alt"></div></div></div>
        <div class="meter-wrap"><div class="meter-label"><span>怒氣</span><span id="rage-text"></span></div><div class="meter"><div id="rage-bar" class="meter-fill rage"></div></div></div>
        <div id="stats" class="stats-grid"></div>
      </section>

      <section class="status-block">
        <h2>命運傾向</h2>
        <div class="fate-row"><span>霸道</span><strong id="fate-tyrant">0</strong></div>
        <div class="fate-row"><span>王道</span><strong id="fate-king">0</strong></div>
        <div class="fate-row"><span>真相</span><strong id="fate-truth">0</strong></div>
      </section>

      <section class="status-block">
        <h2>裝備</h2>
        <div id="equipment-panel" class="equipment-grid"></div>
      </section>

      <section class="status-block">
        <h2>系統</h2>
        <div class="system-buttons">
          <button id="save-btn">儲存進度</button>
          <button id="load-btn">讀取進度</button>
          <button id="toggle-audio-btn">音效：關</button>
          <button id="restart-btn" class="ghost">重新開始</button>
        </div>
        <p id="system-message" class="system-message"></p>
      </section>
    </aside>

    <main class="main panel">
      <section class="chapter-bar">
        <div><span class="small-label">目前章節</span><h2 id="chapter-title">序章</h2></div>
        <div id="chapter-badge" class="chapter-badge">命運啟程</div>
      </section>

      <section class="panel-lite">
        <h3>地圖探索</h3>
        <div id="map-panel" class="map-grid"></div>
      </section>

      <section id="scene-panel" class="scene-panel fade-panel">
        <div id="story-tags" class="story-tags"></div>
        <div id="story" class="story-text"></div>
      </section>

      <section id="battle-panel" class="battle-panel hidden fade-panel">
        <div class="enemy-card">
          <div class="enemy-head">
            <div><div class="small-label">當前敵手</div><h3 id="enemy-name">敵人</h3></div>
            <div id="enemy-level" class="enemy-level">Lv.1</div>
          </div>
          <div class="meter-wrap"><div class="meter-label"><span>敵方氣血</span><span id="enemy-hp-text"></span></div><div class="meter"><div id="enemy-hp-bar" class="meter-fill enemy"></div></div></div>
          <p id="battle-log" class="battle-log"></p>
        </div>
        <div id="battle-actions" class="battle-actions"></div>
      </section>

      <section class="panel-lite">
        <h3>背包</h3>
        <div id="inventory-panel" class="inventory-grid"></div>
      </section>

      <section><div id="choices" class="choices"></div></section>

      <section class="panel-lite log-panel"><h3>劇情日誌</h3><div id="story-log" class="story-log"></div></section>
    </main>
  </div>

  <script src="data/items.js"></script>
  <script src="data/enemies.js"></script>
  <script src="data/map.js"></script>
  <script src="data/story.js"></script>
  <script src="game-plus-fixed.js"></script>
</body>
</html>
